[tasks.test]
description = "Run Python tests in Docker (single worker by default), serialized across worktrees."
usage = 'arg "[<pytest_args>...]" help="Arguments passed to pytest"'
run = './.config/test.sh $usage_pytest_args'

[tasks."test:multi"]
description = "Run the full test suite in parallel (nproc/2 workers), serialized across worktrees."
usage = 'arg "[<pytest_args>...]" help="Arguments passed to pytest"'
run = 'VT_TEST_PARALLEL=1 ./.config/test.sh $usage_pytest_args'

[tasks."test:build"]
description = "Build test Docker image."
env = { UID = "{{exec(command='id -u')}}", GID = "{{exec(command='id -g')}}" }
run = "docker compose build test"

[tasks."test:shell"]
description = "Enter test container shell."
env = { UID = "{{exec(command='id -u')}}", GID = "{{exec(command='id -g')}}" }
run = [
  "docker compose up -d test",
  "docker compose exec test bash"
]

[tasks."test:down"]
description = "Stop test environment."
run = "docker compose down --remove-orphans"

[tasks.format]
description = "Format code with ruff and fix linting issues."
run = [
  "uv run ruff format",
  "uv run ruff check --fix --silent --exit-zero"
]

[tasks."format:check"]
description = "Check code formatting with ruff."
run = "uv run ruff format --check"

